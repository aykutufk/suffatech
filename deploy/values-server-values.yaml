fullnameOverride: "values-server"
replicaCount: 1

image:
  repository: "<NEXUS_PRIVATE_IP>:8083/values-server"
  tag: "v1.0.0"

args:
  - "--schema-dir=/data/values"
  - "--listen=0.0.0.0:5002"

service:
  type: ClusterIP
  port: 80
  targetPort: 5002

volumeMounts:
  - name: values-data
    mountPath: /data/values

volumes:
  - name: values-data
    persistentVolumeClaim:
      claimName: values-server-pvc

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
