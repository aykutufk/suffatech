fullnameOverride: "schema-server"
replicaCount: 1

image:
  repository: "<NEXUS_PRIVATE_IP>:8083/schema-server"
  tag: "v1.0.0"

# Spec'te belirtilen argümanlar tanımlandı
args:
  - "--schema-dir=/data/schemas"
  - "--listen=0.0.0.0:5001"

service:
  type: ClusterIP
  port: 80
  targetPort: 5001

# Pod içinde /data/schemas klasörünü kalıcı diske bağlıyoruz (Persistence)
volumeMounts:
  - name: schema-data
    mountPath: /data/schemas

volumes:
  - name: schema-data
    persistentVolumeClaim:
      claimName: schema-server-pvc # Altyapında açacağımız PVC

# Endpoint (path) net olmadığı için en güvenli yol olan Port Kontrolü (TCP Socket) yapıyoruz
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
