fullnameOverride: "bot-server"
replicaCount: 2

image:
  repository: "<NEXUS_PRIVATE_IP>:8083/bot-server"
  tag: "v1.0.0"

args:
  - "--listen=0.0.0.0:5003"

service:
  type: ClusterIP
  port: 80
  targetPort: 5003

# Diğer servislere Kubernetes iç IP'lerinden (Cluster DNS) ulaşması için adreslerini veriyoruz
env:
  - name: SCHEMA_SERVICE_URL
    value: "http://schema-server.suffatech.svc.cluster.local"
  - name: VALUES_SERVICE_URL
    value: "http://values-server.suffatech.svc.cluster.local"

# AI Modeli API anahtarları gibi sırları VSO üzerinden Vault'tan topluca çekiyoruz
envFrom:
  - secretRef:
      name: vault-bot-server-secrets

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
